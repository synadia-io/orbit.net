name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      NUGET_XMLDOC_MODE: skip
    steps:
      - name: Determine package from tag
        id: pkg
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Tag format: PackageName/vX.Y.Z
          PKG="${TAG%%/*}"
          VERSION="${TAG#*/v}"
          if [ "$PKG" = "$TAG" ] || [ -z "$VERSION" ]; then
            echo "::error::Invalid tag format. Expected: PackageName/vX.Y.Z, got: $TAG"
            exit 1
          fi
          if [[ ! "$PKG" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Package name contains invalid characters: $PKG"
            exit 1
          fi
          echo "pkg=$PKG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package: $PKG, Version: $VERSION"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version
        env:
          PKG: ${{ steps.pkg.outputs.pkg }}
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          FILE_VERSION="$(head -n 1 "src/Synadia.Orbit.${PKG}/version.txt")"
          if [ "$VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Tag version '$VERSION' does not match version.txt '$FILE_VERSION'"
            exit 1
          fi
          echo "Version validated: $VERSION"

      - name: Set up Go
        uses: actions/setup-go@v5
        with: { cache: true }

      - name: Install nats-server
        run: go install github.com/nats-io/nats-server/v2@latest

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            9.x
            10.x

      - name: Test
        working-directory: ./tests/Synadia.Orbit.${{ steps.pkg.outputs.pkg }}.Test
        run: dotnet test -c Release

      - name: Pack
        working-directory: ./src/Synadia.Orbit.${{ steps.pkg.outputs.pkg }}
        # https://learn.microsoft.com/en-us/dotnet/core/tools/dotnet-pack
        run: dotnet pack -c Release -o dist -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg -p:ContinuousIntegrationBuild=true

      - name: Push
        working-directory: ./src/Synadia.Orbit.${{ steps.pkg.outputs.pkg }}/dist
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push *.nupkg -s https://api.nuget.org/v3/index.json -k "$NUGET_API_KEY" --skip-duplicate
